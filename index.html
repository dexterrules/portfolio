<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Sanchit Soni - Portfolio</title>
    <meta name="viewport" content="initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,width=device-width"/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Hide keynote elements until authorized without breaking layout calculations -->
    <style id="keynote-hide-style">
        #stageArea, #slideshowNavigator, #slideNumberControl, #slideNumberDisplay, #helpPlacard, #waitingIndicator {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
    
    <!-- Password Gate & Premium Styles -->
    <style>
        :root {
            --primary: #c084fc;
            --primary-hover: #a855f7;
            --bg-dark: #09090b;
            --card-bg: rgba(20, 20, 23, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
        }

        /* Allow Keynote elements to fade in smoothly once authorized */
        #stageArea, #slideshowNavigator, #slideNumberControl, #slideNumberDisplay, #helpPlacard, #waitingIndicator {
            transition: opacity 0.5s ease;
        }

        #password-gate-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-dark);
            display: none; /* Controlled by JS */
            justify-content: center;
            align-items: center;
            z-index: 999999;
            overflow: hidden;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif;
        }

        .glow-spots {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .glow-spot-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(192, 132, 252, 0.15) 0%, rgba(0,0,0,0) 70%);
        }
        
        .glow-spot-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(0,0,0,0) 70%);
        }

        .password-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 48px 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 10;
            box-sizing: border-box;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }

        .password-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8), 0 0 30px rgba(192, 132, 252, 0.05);
        }

        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            background: rgba(192, 132, 252, 0.08);
            border: 1px solid rgba(192, 132, 252, 0.2);
            margin-bottom: 28px;
            color: var(--primary);
            position: relative;
        }

        .icon-wrapper::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            opacity: 0.15;
            filter: blur(8px);
            z-index: -1;
        }

        .title {
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0 0 32px 0;
            line-height: 1.6;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        .input-label {
            display: block;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        .password-input {
            width: 100%;
            box-sizing: border-box;
            padding: 15px 48px 15px 16px;
            background: rgba(10, 10, 12, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .password-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(192, 132, 252, 0.15);
            background: rgba(10, 10, 12, 0.85);
        }

        .toggle-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .toggle-btn:hover {
            color: var(--text-primary);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(192, 132, 252, 0.15);
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(192, 132, 252, 0.3);
            filter: brightness(1.1);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Premium Play Button Styling for Embedded Videos */
        .custom-video-play-btn {
            position: absolute;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.1);
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s ease;
            opacity: 1;
            pointer-events: auto;
        }

        .custom-video-play-btn:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .play-btn-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s, box-shadow 0.3s;
        }

        .custom-video-play-btn:hover .play-btn-circle {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 40px rgba(192, 132, 252, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.2);
            border-color: rgba(192, 132, 252, 0.5);
            color: #c084fc; /* Match theme color */
        }

        .play-btn-circle svg {
            width: 32px;
            height: 32px;
            margin-left: 4px; /* Optical centering for play triangle */
            filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.2));
            transition: color 0.2s;
        }

        .custom-video-play-btn.playing {
            opacity: 0;
            pointer-events: none; /* Let clicks pass through when playing so user can click to pause */
        }
    </style>
</head>
<body id="body" bgcolor="black">
    
    <!-- Password Gate Overlay -->
    <div id="password-gate-overlay">
        <div class="glow-spots">
            <div class="glow-spot-1"></div>
            <div class="glow-spot-2"></div>
        </div>
        
        <div class="password-card">
            <div class="icon-wrapper">
                <!-- Lock Icon -->
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            
            <h1 class="title">Sanchit Soni</h1>
            <p class="subtitle">This portfolio is password protected. Please enter the password to gain access.</p>
            
            <form id="password-form" autocomplete="off">
                <div class="input-group">
                    <label class="input-label" for="password-input">Password</label>
                    <div class="input-wrapper">
                        <input class="password-input" type="password" id="password-input" placeholder="Enter password" required autofocus>
                        <button class="toggle-btn" type="button" id="toggle-password" aria-label="Toggle password visibility">
                            <!-- Eye Open -->
                            <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <!-- Eye Closed -->
                            <svg class="eye-closed" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button class="submit-btn" type="submit">
                    <span>Unlock Portfolio</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
                
                <div class="error-msg" id="error-msg">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span>Incorrect password. Please try again.</span>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Keynote Elements -->
    <div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div>
    <div id="slideshowNavigator"></div>
    <div id="slideNumberControl"></div>
    <div id="slideNumberDisplay"></div>
    <div id="helpPlacard"></div>
    <div id="waitingIndicator"><div id="waitingSpinner"></div></div>
    
    <!-- Password Verification & Video Helpers Script -->
    <script>
        (function() {
            const correctPassword = 'peppertree';
            const authKey = 'sanchit_portfolio_authorized';
            const overlay = document.getElementById('password-gate-overlay');
            const hideStyle = document.getElementById('keynote-hide-style');
            
            function unlock() {
                // Fade out overlay
                overlay.style.transition = 'opacity 0.4s ease';
                overlay.style.opacity = '0';
                
                // Remove hide style to display Keynote stage
                if (hideStyle) hideStyle.remove();
                
                setTimeout(function() {
                    if (overlay) overlay.remove();
                }, 400);
            }
            
            // 1. Check if user is already authenticated
            if (localStorage.getItem(authKey) === 'true') {
                if (hideStyle) hideStyle.remove();
                if (overlay) overlay.remove();
            } else {
                // Otherwise, display the password gate overlay
                overlay.style.display = 'flex';
                
                // Prevent all events from bubbling up to document/window (Keynote player) while locked
                const eventBlocker = function(e) {
                    e.stopPropagation();
                };
                ['keydown', 'keyup', 'keypress', 'mousedown', 'mouseup', 'click', 'touchstart', 'touchend', 'touchmove'].forEach(function(evt) {
                    overlay.addEventListener(evt, eventBlocker);
                });
            }
            
            // 2. Setup video player helper/play buttons
            function setupVideoPlayOverlay(video) {
                if (video.__hasPlayOverlay) return;
                video.__hasPlayOverlay = true;

                // Ensure autoplay and standard settings
                video.autoplay = true;
                video.playsInline = true;
                video.controls = false;

                // Create play button container
                const playBtn = document.createElement('div');
                playBtn.className = 'custom-video-play-btn';
                playBtn.innerHTML = `
                    <div class="play-btn-circle">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                    </div>
                `;

                // Append overlay to the parent container of the video so it sits on top
                video.parentNode.appendChild(playBtn);

                // Sync play button position & size with the video
                function syncSize() {
                    playBtn.style.position = 'absolute';
                    playBtn.style.top = video.style.top || '0px';
                    playBtn.style.left = video.style.left || '0px';
                    playBtn.style.width = video.style.width || (video.offsetWidth ? video.offsetWidth + 'px' : '100%');
                    playBtn.style.height = video.style.height || (video.offsetHeight ? video.offsetHeight + 'px' : '100%');
                    playBtn.style.transform = video.style.transform || '';
                    playBtn.style.transformOrigin = video.style.transformOrigin || '';
                }
                syncSize();
                
                // Observe style changes (e.g., scale changes from Keynote resize)
                const styleObserver = new MutationObserver(syncSize);
                styleObserver.observe(video, { attributes: true, attributeFilter: ['style', 'class'] });

                // Toggle play state on overlay click
                playBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (video.paused) {
                        video.play().catch(err => console.log('Play failed:', err));
                    } else {
                        video.pause();
                    }
                });

                // Toggle play state on video click
                video.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (video.paused) {
                        video.play().catch(err => console.log('Play failed:', err));
                    } else {
                        video.pause();
                    }
                });

                // Sync overlay state with video events
                video.addEventListener('play', function() {
                    playBtn.classList.add('playing');
                });

                video.addEventListener('pause', function() {
                    playBtn.classList.remove('playing');
                });

                video.addEventListener('ended', function() {
                    playBtn.classList.remove('playing');
                });

                // Try to play immediately if user has already interacted (which they have due to password gate)
                video.play().catch(function(error) {
                    console.log("Autoplay was blocked initially:", error);
                });
            }

            // Monitor DOM for new video elements
            const domObserver = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    mutation.addedNodes.forEach(function(node) {
                        if (node.nodeType === 1) {
                            const videos = node.tagName === 'VIDEO' ? [node] : node.querySelectorAll('video');
                            videos.forEach(setupVideoPlayOverlay);
                        }
                    });
                });
            });
            domObserver.observe(document.body, { childList: true, subtree: true });

            // 3. Set up event listeners for the password card
            const form = document.getElementById('password-form');
            const input = document.getElementById('password-input');
            const card = document.querySelector('.password-card');
            const errorMsg = document.getElementById('error-msg');
            const toggleBtn = document.getElementById('toggle-password');
            const eyeOpen = toggleBtn.querySelector('.eye-open');
            const eyeClosed = toggleBtn.querySelector('.eye-closed');
            
            // Toggle visibility of password field
            toggleBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (input.type === 'password') {
                    input.type = 'text';
                    eyeOpen.style.display = 'none';
                    eyeClosed.style.display = 'block';
                } else {
                    input.type = 'password';
                    eyeOpen.style.display = 'block';
                    eyeClosed.style.display = 'none';
                }
            });
            
            // Form submit handler
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                e.stopPropagation();
                errorMsg.style.display = 'none';
                
                if (input.value === correctPassword) {
                    // Store authorization
                    localStorage.setItem(authKey, 'true');
                    
                    // Trigger exit animations
                    card.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease';
                    card.style.transform = 'scale(0.94) translateY(10px)';
                    card.style.opacity = '0';
                    
                    unlock();
                } else {
                    // Shake card and show error
                    card.classList.remove('shake');
                    void card.offsetWidth; // Force DOM reflow
                    card.classList.add('shake');
                    errorMsg.style.display = 'flex';
                    input.value = '';
                    input.focus();
                }
            });
        })();
    </script>
    
    <!-- Load Keynote player script statically -->
    <script src="assets/player/main.js"></script>
</body>
</html>
